# OnlyQR — the one compose file. Same app, two modes:
#
#   dev   docker compose build dev     docker compose up            # hot reload, open http://localhost:5173
#   prod  docker compose build prod    docker compose up prod -d    # public app,  http://127.0.0.1:8000
#
# Both build the same app (frontend + FastAPI backend + /api/qr + the daily
# QR-generation counter). The difference is only how it runs:
#   - dev  -> Dockerfile.dev, uvicorn --reload + Vite, source bind-mounted, ports open.
#   - prod -> Dockerfile (prod target), gunicorn serves the BUILT React app + API from
#             one container, bound to localhost (a shared reverse proxy is the public edge).
#
# `prod` sits behind a profile so a bare `docker compose up` stays on dev; naming it
# explicitly (`build prod` / `up prod`) brings it in. Both modes share Valkey, whose
# named volume persists the QR counts.

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: onlyqr-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data # persist the daily QR-generation counts across restarts

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: onlyqr-codes-dev
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/app # live source for both backend + frontend reload
      - /app/frontend/node_modules # keep the image's linux deps (don't shadow with host)
    environment:
      - ENV=development
      - VITE_USE_POLLING=true # FS-event polling so HMR fires on bind mounts (macOS/Windows)
      - REDIS_URL=redis://valkey:6379
    depends_on:
      - valkey

  prod:
    profiles: ["prod"] # excluded from a bare `docker compose up`; enabled when named explicitly
    build:
      context: .
      target: prod # multi-stage Dockerfile: Node builds the React app, gunicorn serves app + API
      args:
        # Bake the git version into the image: APP_VERSION=$(git describe --tags) docker compose build prod
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: onlyqr-codes-prod
    restart: always
    ports:
      - "127.0.0.1:8000:8000" # optional: localhost debugging on the box; the public path is via Traefik
    environment:
      - ENV=production
      - REDIS_URL=redis://valkey:6379
    depends_on:
      - valkey
    networks:
      - default # reach Valkey
      - traefik-public # reached by the shared Traefik edge proxy
    labels:
      # Published at https://onlyqr.codes via the shared Traefik (Let's Encrypt + Cloudflare DNS-01).
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.onlyqr.rule=Host(`onlyqr.codes`)"
      - "traefik.http.routers.onlyqr.entrypoints=websecure"
      - "traefik.http.routers.onlyqr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.onlyqr.middlewares=onlyqr-security-headers@file,gzip-compress@file"
      - "traefik.http.routers.onlyqr.service=onlyqr"
      - "traefik.http.services.onlyqr.loadbalancer.server.port=8000" # gunicorn inside the container

volumes:
  valkey-data:

networks:
  # The shared edge network owned by the Traefik stack.
  # Only `prod` joins it; `dev` and `valkey` stay on the project's default network.
  traefik-public:
    external: true
