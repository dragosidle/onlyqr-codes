# Auto-versioning: every push to master mints the next semver tag and a GitHub
# release. Default bump is patch; put "#minor" or "#major" anywhere in the head
# commit message to bump those instead. If HEAD is already tagged (manual tag,
# e.g. v1.0.0), no new tag is minted — the release is created for that tag if
# it doesn't exist yet. Uses only the built-in GITHUB_TOKEN and first-party
# actions (no third-party supply chain).

name: Version & release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so git describe can see all tags

      - name: Determine version
        id: ver
        run: |
          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)
          if [ -n "$latest" ] && [ "$(git rev-list -n1 "$latest")" = "$GITHUB_SHA" ]; then
            echo "tag=$latest" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          else
            IFS=. read -r maj min pat <<< "${latest#v}"
            : "${maj:=0}" "${min:=0}" "${pat:=0}"
            case "$(git log -1 --pretty=%B)" in
              *'#major'*) maj=$((maj+1)); min=0; pat=0 ;;
              *'#minor'*) min=$((min+1)); pat=0 ;;
              *)          pat=$((pat+1)) ;;
            esac
            echo "tag=v$maj.$min.$pat" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.ver.outputs.create_tag == 'true'
        run: |
          git tag "${{ steps.ver.outputs.tag }}" "$GITHUB_SHA"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --generate-notes
